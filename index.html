<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日土味情話 Bot</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #333;
    }

    .card {
      width: 90%;
      max-width: 540px;
      background: white;
      border-radius: 24px;
      padding: 36px 28px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.18);
    }

    .emoji {
      font-size: 64px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      color: #ff4f7b;
    }

    p {
      font-size: 17px;
      line-height: 1.8;
      margin: 18px 0;
    }

    .status {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 18px;
      border-radius: 999px;
      background: #e8fff0;
      color: #159447;
      font-weight: bold;
    }

    .box {
      margin-top: 24px;
      padding: 18px;
      background: #fff4f7;
      border-radius: 16px;
      text-align: left;
      font-size: 15px;
      line-height: 1.8;
    }

    code {
      background: #ffe0e8;
      padding: 3px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">💘</div>
    <h1>每日土味情話 Bot</h1>

    <p>
      這是一隻會每天隨機挑一位 Discord 成員，<br />
      然後 @ 他講一句土味情話的機器人。
    </p>

    <div class="status">Bot 網站運作中</div>

    <div class="box">
      <strong>功能：</strong><br />
      1. 每天台灣時間 09:00～20:59 隨機發送<br />
      2. 隨機 @ 一位伺服器成員<br />
      3. 隨機抽一句土味情話<br />
      4. 可用 <code>!情話</code> 手動測試<br />
      5. <code>/health</code> 可給 UptimeRobot 偵測
    </div>
  </div>
</body>
</html>
